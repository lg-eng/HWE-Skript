<svg width="600" height="240" xmlns="http://www.w3.org/2000/svg">

  <!-- Styles -->
  <style>
    text { font-family: Arial, sans-serif; font-size: 14px; }
    .small-text { font-size: 11px; }
    .node { fill: black; }
  </style>

  <!-- Left voltage source u1 -->
  <text x="15" y="115" class="small-text">u₁</text>
  <circle cx="25" cy="120" r="15" fill="none" stroke="black" stroke-width="2"/>
  <line x1="25" y1="110" x2="25" y2="115" stroke="black" stroke-width="2"/>
  <line x1="25" y1="125" x2="25" y2="130" stroke="black" stroke-width="2"/>
  <line x1="22" y1="127" x2="28" y2="127" stroke="black" stroke-width="1"/>
  
  <!-- Ground symbol under u1 -->
  <line x1="25" y1="135" x2="25" y2="145" stroke="black" stroke-width="2"/>
  <line x1="15" y1="145" x2="35" y2="145" stroke="black" stroke-width="2"/>
  <line x1="18" y1="148" x2="32" y2="148" stroke="black" stroke-width="1"/>
  <line x1="21" y1="151" x2="29" y2="151" stroke="black" stroke-width="1"/>

  <!-- C' capacitor from u1 -->
  <line x1="25" y1="105" x2="25" y2="80" stroke="black" stroke-width="2"/>
  <line x1="20" y1="80" x2="30" y2="80" stroke="black" stroke-width="2"/>
  <line x1="20" y1="75" x2="30" y2="75" stroke="black" stroke-width="2"/>
  <text x="5" y="70" class="small-text">C'</text>
  
  <!-- Connection to OP1 input -->
  <line x1="25" y1="75" x2="25" y2="50" stroke="black" stroke-width="2"/>
  <line x1="25" y1="50" x2="70" y2="50" stroke="black" stroke-width="2"/>
  <text x="40" y="45" class="small-text">i₁</text>
  <circle cx="70" cy="50" r="3" class="node"/>
  
  <!-- OP1 -->
  <polygon points="90,30 90,80 150,55" fill="none" stroke="black" stroke-width="2"/>
  <line x1="70" y1="50" x2="90" y2="50" stroke="black" stroke-width="2"/>
  <line x1="90" y1="60" x2="70" y2="60" stroke="black" stroke-width="2"/>
  <line x1="70" y1="60" x2="70" y2="145" stroke="black" stroke-width="2"/>
  
  <!-- Ground at OP1+ input -->
  <line x1="60" y1="145" x2="80" y2="145" stroke="black" stroke-width="2"/>
  <line x1="63" y1="148" x2="77" y2="148" stroke="black" stroke-width="1"/>
  <line x1="66" y1="151" x2="74" y2="151" stroke="black" stroke-width="1"/>
  
  <text x="95" y="58">+</text>
  <text x="95" y="48">−</text>
  <text x="110" y="43" class="small-text">OP1</text>
  
  <!-- OP1 output and label -->
  <line x1="150" y1="55" x2="180" y2="55" stroke="black" stroke-width="2"/>
  <text x="160" y="50" class="small-text">uC</text>
  <circle cx="180" cy="55" r="3" class="node"/>
  
  <!-- Feedback capacitor C from output to input of OP1 -->
  <line x1="180" y1="55" x2="180" y2="15" stroke="black" stroke-width="2"/>
  <line x1="175" y1="15" x2="185" y2="15" stroke="black" stroke-width="2"/>
  <line x1="175" y1="10" x2="185" y2="10" stroke="black" stroke-width="2"/>
  <line x1="180" y1="10" x2="70" y2="10" stroke="black" stroke-width="2"/>
  <line x1="70" y1="10" x2="70" y2="47" stroke="black" stroke-width="2"/>
  <text x="115" y="25" class="small-text">C</text>
  
  <!-- Connection from OP1 output to middle capacitors -->
  <line x1="180" y1="55" x2="240" y2="55" stroke="black" stroke-width="2"/>
  
  <!-- Middle capacitor (top) -->
  <line x1="240" y1="55" x2="240" y2="80" stroke="black" stroke-width="2"/>
  <line x1="235" y1="80" x2="245" y2="80" stroke="black" stroke-width="2"/>
  <line x1="235" y1="85" x2="245" y2="85" stroke="black" stroke-width="2"/>
  
  <!-- Variable resistor x -->
  <line x1="240" y1="85" x2="240" y2="110" stroke="black" stroke-width="2"/>
  <path d="M 235 95 L 245 95 L 240 105 L 235 95" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="248" y="100" class="small-text">x</text>
  
  <!-- Middle capacitor (bottom) -->
  <line x1="240" y1="110" x2="240" y2="130" stroke="black" stroke-width="2"/>
  <line x1="235" y1="130" x2="245" y2="130" stroke="black" stroke-width="2"/>
  <line x1="235" y1="135" x2="245" y2="135" stroke="black" stroke-width="2"/>
  <line x1="240" y1="135" x2="240" y2="145" stroke="black" stroke-width="2"/>
  
  <!-- Ground at middle bottom -->
  <line x1="230" y1="145" x2="250" y2="145" stroke="black" stroke-width="2"/>
  <line x1="233" y1="148" x2="247" y2="148" stroke="black" stroke-width="1"/>
  <line x1="236" y1="151" x2="244" y2="151" stroke="black" stroke-width="1"/>
  
  <!-- Connection to OP2 -->
  <circle cx="240" cy="95" r="3" class="node"/>
  <line x1="240" y1="95" x2="320" y2="95" stroke="black" stroke-width="2"/>
  
  <!-- Resistor R before OP2 -->
  <rect x="320" y="85" width="40" height="20" fill="none" stroke="black" stroke-width="2"/>
  <text x="330" y="98" class="small-text">R</text>
  <line x1="360" y1="95" x2="390" y2="95" stroke="black" stroke-width="2"/>
  
  <circle cx="390" cy="95" r="3" class="node"/>
  
  <!-- OP2 -->
  <polygon points="410,75 410,125 470,100" fill="none" stroke="black" stroke-width="2"/>
  <line x1="390" y1="95" x2="410" y2="95" stroke="black" stroke-width="2"/>
  <line x1="410" y1="105" x2="390" y2="105" stroke="black" stroke-width="2"/>
  <line x1="390" y1="105" x2="390" y2="145" stroke="black" stroke-width="2"/>
  
  <!-- Ground at OP2+ input -->
  <line x1="380" y1="145" x2="400" y2="145" stroke="black" stroke-width="2"/>
  <line x1="383" y1="148" x2="397" y2="148" stroke="black" stroke-width="1"/>
  <line x1="386" y1="151" x2="394" y2="151" stroke="black" stroke-width="1"/>
  
  <text x="415" y="103">+</text>
  <text x="415" y="93">−</text>
  <text x="430" y="88" class="small-text">OP2</text>
  
  <!-- OP2 output -->
  <line x1="470" y1="100" x2="510" y2="100" stroke="black" stroke-width="2"/>
  <circle cx="510" cy="100" r="3" class="node"/>
  
  <!-- Output label u2 -->
  <text x="520" y="105" class="small-text">u₂</text>
  
  <!-- Ground at output -->
  <line x1="540" y1="100" x2="540" y2="145" stroke="black" stroke-width="2"/>
  <line x1="530" y1="145" x2="550" y2="145" stroke="black" stroke-width="2"/>
  <line x1="533" y1="148" x2="547" y2="148" stroke="black" stroke-width="1"/>
  <line x1="536" y1="151" x2="544" y2="151" stroke="black" stroke-width="1"/>
  
  <!-- Feedback resistor R from OP2 output to input -->
  <line x1="510" y1="100" x2="510" y2="60" stroke="black" stroke-width="2"/>
  <rect x="490" y="50" width="40" height="20" fill="none" stroke="black" stroke-width="2"/>
  <text x="500" y="63" class="small-text">R</text>
  <line x1="490" y1="60" x2="390" y2="60" stroke="black" stroke-width="2"/>
  <line x1="390" y1="60" x2="390" y2="92" stroke="black" stroke-width="2"/>
  
  <!-- Labels for u1 and i1 at middle -->
  <text x="225" y="70" class="small-text">u₁</text>
  
  <!-- Voltage divider label -->
  <text x="260" y="105" class="small-text">V₀ = u₂/u₁ = 2x-1</text>

</svg>
